<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Quảng Cáo</title>
    
    <!-- Mã Script Quảng Cáo của bạn -->
    <script src="https://pl29422457.profitablecpmratenetwork.com/a6/d0/99/a6d099bbcaaa4ba534aa37bf6598b212.js"></script>

    <style>
        /* Thiết lập nền trang web */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Khung hiển thị quảng cáo */
        .ad-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }

        .ad-box {
            background-color: #ffffff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 40px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .status-text {
            color: #666;
            font-size: 14px;
            margin-top: 15px;
        }

        /* Hiệu ứng loading đơn giản trong khi chờ script tải quảng cáo */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="ad-wrapper">
        <div class="ad-box">
            <!-- Khu vực quảng cáo sẽ xuất hiện tại đây nhờ script -->
            <div class="loader"></div>
            <p class="status-text">Đang tải nội dung quảng cáo...</p>
        </div>
    </div>

</body>
</html>
